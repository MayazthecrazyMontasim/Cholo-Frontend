<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cholo - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#1D9E75",
                    "on-primary": "#ffffff",
                    "primary-container": "#0D2819",
                    "on-primary-container": "#BDEBDB",
                    "secondary": "#4A6359",
                    "on-secondary": "#ffffff",
                    "surface": "#0A0F0D",
                    "on-surface": "#E1E3DF",
                    "surface-container": "#111412",
                    "outline": "#8A938C",
                    "outline-variant": "#404943",
                    "background": "#050807"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "0.75rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Be Vietnam Pro", "sans-serif"],
                    "body": ["Hind Siliguri", "sans-serif"],
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Hind Siliguri', sans-serif;
        }
        .logo-font {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -right-[15%] w-[500px] h-[500px] bg-primary/15 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-md z-10">
<div class="bg-surface-container border border-outline-variant/50 rounded-2xl p-8 shadow-sm">
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="travel_explore">travel_explore</span>
<span class="text-3xl font-black logo-font tracking-tighter text-on-surface">Cholo</span>
</div>
<h1 class="text-2xl font-bold text-on-surface">Create Account</h1>
<p class="text-outline mt-1 text-sm">Start your journey with us</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="fullname">Full Name</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="fullname" placeholder="Enter your full name" type="text" required/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="email">email</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="email" placeholder="Enter your email" type="email" required/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person_outline">person_outline</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="username" placeholder="Choose a username" type="text" required/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="password" placeholder="Create a strong password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="confirmPassword">Confirm Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="confirmPassword" placeholder="Confirm your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-3">
<input class="mt-1 w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" type="checkbox" required/>
<label class="text-xs text-outline leading-relaxed" for="terms">
I agree to the <a href="#" class="text-primary font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-primary font-semibold hover:underline">Privacy Policy</a>
</label>
</div>
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-4 text-outline font-bold tracking-widest">or</span>
</div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="w-full border border-outline-variant bg-surface hover:bg-background text-on-surface py-3.5 rounded-xl font-semibold transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="login">login</span>
                    Login Instead
                </button>
</div>
<p class="mt-8 text-center text-sm text-outline font-medium">
                Already have an account? <a class="text-primary font-bold hover:underline" href="../login_page_cholo_matched_2/code.html">Log In</a>
</p>
</div>
</div>
</main>
<footer class="py-8 px-6 text-center z-10">
<div class="flex justify-center items-center gap-6 text-outline text-xs font-bold uppercase tracking-widest mb-4">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Help</a>
</div>
<p class="text-outline/60 text-xs">© 2024 Cholo Travel Ecosystem. All rights reserved.</p>
</footer>
<div class="fixed top-6 right-6 hidden md:block">
<div class="flex items-center gap-1 bg-surface-container p-1 rounded-full border border-outline-variant shadow-sm"><button id="themeToggle" aria-label="Toggle light mode" class="w-9 h-9 flex items-center justify-center text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]">light_mode</span>
</button>
<button class="px-4 py-2 text-xs font-bold text-on-primary bg-primary rounded-full">EN</button>
<button class="px-4 py-2 text-xs font-bold text-outline hover:text-primary transition-colors">BN</button>
</div>
</div>

<script>
    const themeToggleBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
        window.location.replace('../signup_page_cholo/code.html');
    }
    themeToggleBtn.addEventListener('click', () => {
        localStorage.setItem('theme', 'light');
        window.location.href = '../signup_page_cholo/code.html';
    });

    const API_BASE_URL = "https://cholo-live-api-1.onrender.com";

    // Password visibility toggle
    document.querySelectorAll('button[type="button"]').forEach(button => {
        if (button.querySelector('span[data-icon="visibility"]')) {
            button.addEventListener('click', () => {
                const input = button.parentElement.querySelector('input');
                const icon = button.querySelector('span');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    });

    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const termsAccepted = document.getElementById('terms').checked;
        const submitBtn = document.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;

        // Validation
        if (password !== confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        if (password.length < 8) {
            alert('Password must be at least 8 characters long!');
            return;
        }

        if (!termsAccepted) {
            alert('Please accept the Terms of Service and Privacy Policy!');
            return;
        }

        try {
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span><span>Creating account...</span>';
            submitBtn.disabled = true;

            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Registration failed. Please try again.');
            }

            const data = await response.json();
            alert('Account created successfully! Please login to continue.');
            
            // Redirect to login page
            window.location.href = '../login_page_cholo_matched_2/code.html';
        } catch (error) {
            alert(error.message);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // Handle Login Instead button
    document.querySelector('button.bg-surface').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = '../login_page_cholo_matched_2/code.html';
    });
</script>
</body></html>
