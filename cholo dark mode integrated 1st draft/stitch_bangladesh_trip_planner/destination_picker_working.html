<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cholo - Destination Picker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            color: #1a1a18;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #00695c;
            margin-bottom: 10px;
        }
        .search-section {
            margin-bottom: 30px;
        }
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e8e4d9;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus {
            border-color: #00695c;
        }
        .search-button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: #00695c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-button:hover {
            background: #004d40;
        }
        .destinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .destination-card {
            background: white;
            border: 2px solid #e8e4d9;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .destination-card:hover {
            border-color: #00695c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 105, 92, 0.15);
        }
        .destination-card.selected {
            border-color: #00695c;
            background: #e8f5e9;
        }
        .destination-emoji {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .destination-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .destination-type {
            color: #7a786e;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .destination-description {
            color: #3d3d38;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .checkmark {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            background: #00695c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            display: none;
        }
        .destination-card.selected .checkmark {
            display: flex;
        }
        .find-services-btn {
            background: #00695c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: background 0.3s;
        }
        .find-services-btn:hover {
            background: #004d40;
        }
        .find-services-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .map-section {
            margin-bottom: 30px;
        }
        .map-container {
            position: relative;
            width: 100%;
            height: 400px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status-message {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: 500;
        }
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Where are we going?</h1>
            <p>Select destinations from Bangladesh or search on Google Maps</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search destinations in Bangladesh..."
                    onkeyup="handleSearch(event)"
                >
                <button class="search-button" onclick="searchGoogleMaps()">
                    🗺️ Google Maps
                </button>
            </div>
            <div id="searchResults"></div>
        </div>

        <div class="map-section">
            <div class="map-container">
                <iframe 
                    id="mapFrame"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3746765.251413645!2d88.001391!3d23.684994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30adaaed8039a3af%3A0xfc611b0bb3005b4!2sBangladesh!5e0!3m2!1sen!2sbd!4v1715694200000!5m2!1sen!2sbd"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>

        <div class="destinations-grid" id="destinationsGrid">
            <!-- Destinations will be populated by JavaScript -->
        </div>

        <div id="statusMessage"></div>

        <button class="find-services-btn" id="findServicesBtn" onclick="findServices()" disabled>
            Find Services (0 selected)
        </button>
    </div>

    <script>
        // Destination data
        const destinations = [
            { name: "Cox's Bazar", type: 'Coastal Region', emoji: '🏖️', description: 'World\'s longest natural sea beach' },
            { name: 'Sundarbans', type: 'Mangrove Forest', emoji: '🐅', description: 'Largest mangrove forest and Royal Bengal tigers' },
            { name: 'Sylhet', type: 'Tea Estates', emoji: '🍵', description: 'Tea gardens and natural beauty' },
            { name: 'Bandarban', type: 'Cloudy Peaks', emoji: '⛰️', description: 'Hill district with tribal culture' },
            { name: 'Rangamati', type: 'Hill Tracts', emoji: '🛶', description: 'Lake district and hill tracts' },
            { name: 'Sreemangal', type: 'Rainforest', emoji: '🍃', description: 'Tea capital and rain forests' },
            { name: 'Saint Martin', type: 'Coral Island', emoji: '🏝️', description: 'Beautiful coral island' },
            { name: 'Kuakata', type: 'Daughter of Ocean', emoji: '🌅', description: 'Sunrise and sunset beach' },
            { name: 'Dhaka', type: 'Capital City', emoji: '🏙️', description: 'Historic capital and cultural hub' },
            { name: 'Chittagong', type: 'Port City', emoji: '⚓', description: 'Major port and business hub' },
            { name: 'Rajshahi', type: 'Silk City', emoji: '🧵', description: 'Silk industry and mango gardens' },
            { name: 'Khulna', type: 'Industrial City', emoji: '🏭', description: 'Industrial hub near Sundarbans' },
            { name: 'Barisal', type: 'Venice of Bengal', emoji: '🚤', description: 'Riverine district and floating markets' },
            { name: 'Mymensingh', type: 'Educational Hub', emoji: '🎓', description: 'Educational institutions and rural beauty' }
        ];

        let selectedDestinations = [];

        // Initialize the page
        function initializePage() {
            console.log('Initializing destination picker...');
            renderDestinations();
            updateFindServicesButton();
            showStatus('Destination picker loaded successfully!', 'success');
        }

        // Render destination cards
        function renderDestinations(searchTerm = '') {
            const grid = document.getElementById('destinationsGrid');
            const filteredDestinations = searchTerm 
                ? destinations.filter(dest => 
                    dest.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    dest.type.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    dest.description.toLowerCase().includes(searchTerm.toLowerCase())
                  )
                : destinations;

            grid.innerHTML = filteredDestinations.map(dest => `
                <div class="destination-card ${selectedDestinations.some(d => d.name === dest.name) ? 'selected' : ''}" 
                     onclick="toggleDestination('${dest.name}', '${dest.type}', '${dest.emoji}')">
                    <div class="checkmark">✓</div>
                    <div class="destination-emoji">${dest.emoji}</div>
                    <div class="destination-name">${dest.name}</div>
                    <div class="destination-type">${dest.type}</div>
                    <div class="destination-description">${dest.description}</div>
                </div>
            `).join('');
        }

        // Toggle destination selection
        function toggleDestination(name, type, emoji) {
            const index = selectedDestinations.findIndex(d => d.name === name);
            
            if (index > -1) {
                selectedDestinations.splice(index, 1);
                showStatus(`Deselected: ${name}`, 'info');
            } else {
                selectedDestinations.push({ name, type, emoji });
                showStatus(`Selected: ${name}`, 'success');
                updateMap(name);
            }
            
            // Save to localStorage
            localStorage.setItem('cholo_selected_destinations', JSON.stringify(selectedDestinations));
            
            renderDestinations();
            updateFindServicesButton();
        }

        // Update Google Maps
        function updateMap(destinationName) {
            const mapFrame = document.getElementById('mapFrame');
            const encodedDestination = encodeURIComponent(destinationName + ', Bangladesh');
            const mapUrl = `https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3746765.251413645!2d88.001391!3d23.684994!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x30adaaed8039a3af%3A0xfc611b0bb3005b4!2s${encodedDestination}!5e0!3m2!1sen!2sbd!4v1715694200000!5m2!1sen!2sbd`;
            mapFrame.src = mapUrl;
        }

        // Handle search
        function handleSearch(event) {
            const searchTerm = event.target.value;
            renderDestinations(searchTerm);
        }

        // Search on Google Maps
        function searchGoogleMaps() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput.value.trim();
            
            if (searchTerm) {
                const googleMapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(searchTerm + ', Bangladesh')}`;
                window.open(googleMapsUrl, '_blank');
                showStatus(`Opening Google Maps for: ${searchTerm}`, 'info');
            } else {
                showStatus('Please enter a destination to search on Google Maps', 'error');
            }
        }

        // Update Find Services button
        function updateFindServicesButton() {
            const button = document.getElementById('findServicesBtn');
            const count = selectedDestinations.length;
            button.textContent = `Find Services (${count} selected)`;
            button.disabled = count === 0;
        }

        // Find Services - navigate to services page
        function findServices() {
            if (selectedDestinations.length === 0) {
                showStatus('Please select at least one destination!', 'error');
                return;
            }

            // Save trip data
            const tripData = {
                step_2: {
                    destinations: selectedDestinations,
                    timestamp: new Date().toISOString()
                }
            };
            localStorage.setItem('cholo_trip_data', JSON.stringify(tripData));
            
            showStatus(`Navigating to services with ${selectedDestinations.length} destinations...`, 'success');
            
            // Navigate to services page
            setTimeout(() => {
                window.location.href = '../travel_services_cholo_1/code.html';
            }, 1000);
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            // Auto-hide after 3 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // Load saved selections on page load
        function loadSavedSelections() {
            const saved = localStorage.getItem('cholo_selected_destinations');
            if (saved) {
                try {
                    selectedDestinations = JSON.parse(saved);
                    console.log('Loaded saved destinations:', selectedDestinations);
                } catch (e) {
                    console.error('Error loading saved destinations:', e);
                }
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing...');
            loadSavedSelections();
            initializePage();
        });

        // Test JavaScript execution
        console.log('Destination picker script loaded successfully at:', new Date().toISOString());
    </script>
</body>
</html>
