<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cholo - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#1D9E75",
                    "on-primary": "#ffffff",
                    "primary-container": "#144D3A",
                    "on-primary-container": "#D1F2E7",
                    "secondary": "#4A6359",
                    "on-secondary": "#ffffff",
                    "surface": "#141B18",
                    "on-surface": "#E1E3E0",
                    "surface-container": "#0f1512",
                    "outline": "#89938E",
                    "outline-variant": "#3F4944",
                    "background": "#0b100e"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "0.75rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Be Vietnam Pro", "sans-serif"],
                    "body": ["Hind Siliguri", "sans-serif"],
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Hind Siliguri', sans-serif;
        }
        .logo-font {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -right-[15%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-md z-10">
<div class="bg-surface-container border border-outline-variant/50 rounded-2xl p-8 shadow-2xl">
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="travel_explore">travel_explore</span>
<span class="text-3xl font-black logo-font tracking-tighter text-on-surface">Cholo</span>
</div>
<h1 class="text-2xl font-bold text-on-surface">Welcome back</h1>
<p class="text-outline mt-1 text-sm">Adventure awaits you</p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/40" id="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-xs font-bold text-outline uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/40" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-4 text-outline font-bold tracking-widest">or</span>
</div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="w-full border border-outline-variant bg-surface hover:bg-background text-on-surface py-3.5 rounded-xl font-semibold transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="person_outline">person_outline</span>
                    Start as Guest
                </button>
</div>
<p class="mt-8 text-center text-sm text-outline font-medium">
                New to Cholo? <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
</div>
</div>
</main>
<footer class="py-8 px-6 text-center z-10">
<div class="flex justify-center items-center gap-6 text-outline text-xs font-bold uppercase tracking-widest mb-4">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Help</a>
</div>
<p class="text-outline/60 text-xs">© 2024 Cholo Travel Ecosystem. All rights reserved.</p>
</footer>
<div class="fixed top-6 right-6 hidden md:block">
<div class="flex items-center gap-1 bg-surface-container p-1 rounded-full border border-outline-variant shadow-sm"><button id="themeToggle" aria-label="Toggle dark mode" class="w-9 h-9 flex items-center justify-center text-primary bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">light_mode</span>
</button>
<button class="px-4 py-2 text-xs font-bold text-on-primary bg-primary rounded-full">EN</button>
<button class="px-4 py-2 text-xs font-bold text-outline hover:text-primary transition-colors">BN</button>
</div>
</div>
<script>
    const themeToggleBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'light') {
        window.location.replace('../login_page_cholo_matched_1/code.html');
    }
    themeToggleBtn.addEventListener('click', () => {
        localStorage.setItem('theme', 'light');
        window.location.href = '../login_page_cholo_matched_1/code.html';
    });

    // Connect "Create Account" link
    document.querySelector('a[href="#"]').addEventListener('click', (e) => {
        if(e.target.textContent === 'Create Account') {
            e.preventDefault();
            window.location.href = '../signup_page_cholo_dark/code.html';
        }
    });

    const API_BASE_URL = "https://cholo-live-api-1.onrender.com";

    // Secure password verification using Web Crypto API
    async function verifyPassword(password, storedHash) {
        try {
            const combined = new Uint8Array(
                atob(storedHash).split('').map(char => char.charCodeAt(0))
            );
            
            const salt = combined.slice(0, 32);
            const storedHashBuffer = combined.slice(32);
            
            // Re-hash the password with the same salt
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                data,
                { name: 'PBKDF2' },
                false,
                ['deriveBits', 'deriveKey']
            );
            
            const key = await crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                true,
                ['encrypt', 'decrypt']
            );
            
            const exported = await crypto.subtle.exportKey('raw', key);
            const hashBuffer = new Uint8Array(exported);
            
            // Constant-time comparison
            if (storedHashBuffer.length !== hashBuffer.length) {
                return false;
            }
            
            for (let i = 0; i < storedHashBuffer.length; i++) {
                if (storedHashBuffer[i] !== hashBuffer[i]) {
                    return false;
                }
            }
            
            return true;
        } catch (error) {
            console.error('Password verification error:', error);
            return false;
        }
    }

    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const submitBtn = document.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;

        try {
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span><span>Logging in...</span>';
            submitBtn.disabled = true;

            // Try backend API first
            try {
                // FastAPI OAuth2PasswordRequestForm requires URL encoded form data
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch(`${API_BASE_URL}/auth/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    // Save the JWT token
                    localStorage.setItem('cholo_token', data.access_token);
                    
                    // Redirect to dashboard
                    window.location.href = '../dashboard_cholo_1/code.html';
                    return;
                }
            } catch (apiError) {
                console.log('Backend API failed, trying local storage');
            }

            // Fallback: Check local storage with secure password verification
            const users = JSON.parse(localStorage.getItem('cholo_users') || '[]');
            const user = users.find(u => u.email === email);
            
            if (user && await verifyPassword(password, user.password)) {
                // Create a fake token for local storage
                const fakeToken = btoa(JSON.stringify({ username: user.username, id: user.id }));
                localStorage.setItem('cholo_token', fakeToken);
                localStorage.setItem('current_user', JSON.stringify(user));
                
                // Redirect to dashboard
                window.location.href = '../dashboard_cholo_1/code.html';
                return;
            }

            throw new Error('Invalid email or password');

        } catch (error) {
            alert(error.message);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // Handle Start as Guest button
    document.querySelector('button.bg-surface').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = '../dashboard_cholo_1/code.html';
    });
</script>
</body></html>
