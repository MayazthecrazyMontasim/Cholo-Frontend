I agree to the <a href="#" onclick="showTerms(); return false;" class="text-primary font-semibold hover:underline">Terms of Service</a> and <a href="#" onclick="showPrivacy(); return false;" class="text-primary font-semibold hover:underline">Privacy Policy</a>
</label>

<button class="w-full bg-primary text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>

<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container px-4 text-outline font-bold tracking-widest">or</span>
</div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="w-full border border-outline-variant bg-surface hover:bg-background text-on-surface py-3.5 rounded-xl font-semibold transition-colors flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="login">login</span>
                    Login Instead
                </button>
</div>
<p class="mt-8 text-center text-sm text-outline font-medium">
                Already have an account? <a class="text-primary font-bold hover:underline" href="../login_page_cholo_matched_1/code.html">Log In</a>
</p>

</main>
<footer class="py-8 px-6 text-center z-10">
<div class="flex justify-center items-center gap-6 text-outline text-xs font-bold uppercase tracking-widest mb-4">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
<a class="hover:text-primary transition-colors" href="#">Help</a>
</div>
<p class="text-outline/60 text-xs">© 2024 Cholo Travel Ecosystem. All rights reserved.</p>
</footer>
<div class="fixed top-6 right-6 hidden md:block">
<div class="flex items-center gap-1 bg-surface-container p-1 rounded-full border border-outline-variant shadow-sm"><button id="themeToggle" aria-label="Toggle dark mode" class="w-9 h-9 flex items-center justify-center text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]">dark_mode</span>
</button>
<button class="px-4 py-2 text-xs font-bold text-on-primary bg-primary rounded-full">EN</button>
<button class="px-4 py-2 text-xs font-bold text-outline hover:text-primary transition-colors">BN</button>
</div>

<script>
    const themeToggleBtn = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') {
        window.location.replace('../signup_page_cholo_dark/code.html');
    }
    themeToggleBtn.addEventListener('click', () => {
        localStorage.setItem('theme', 'dark');
        window.location.href = '../signup_page_cholo_dark/code.html';
    });

    const API_BASE_URL = "https://cholo-live-api-1.onrender.com";

    // Secure password hashing using Web Crypto API
    async function hashPassword(password, salt = null) {
        if (!salt) {
            salt = crypto.getRandomValues(new Uint8Array(32));
        }
        
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const keyMaterial = await crypto.subtle.importKey(
            'raw',
            data,
            { name: 'PBKDF2' },
            false,
            ['deriveBits', 'deriveKey']
        );
        
        const key = await crypto.subtle.deriveKey(
            {
                name: 'PBKDF2',
                salt: salt,
                iterations: 100000,
                hash: 'SHA-256'
            },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            true,
            ['encrypt', 'decrypt']
        );
        
        const exported = await crypto.subtle.exportKey('raw', key);
        const hashBuffer = new Uint8Array(exported);
        
        // Combine salt and hash for storage
        const combined = new Uint8Array(salt.length + hashBuffer.length);
        combined.set(salt);
        combined.set(hashBuffer, salt.length);
        
        return btoa(String.fromCharCode(...combined));
    }

    async function verifyPassword(password, storedHash) {
        try {
            const combined = new Uint8Array(
                atob(storedHash).split('').map(char => char.charCodeAt(0))
            );
            
            const salt = combined.slice(0, 32);
            const storedHashBuffer = combined.slice(32);
            
            const newHash = await hashPassword(password, salt);
            const newCombined = new Uint8Array(
                atob(newHash).split('').map(char => char.charCodeAt(0))
            );
            const newHashBuffer = newCombined.slice(32);
            
            // Constant-time comparison
            if (storedHashBuffer.length !== newHashBuffer.length) {
                return false;
            }
            
            for (let i = 0; i < storedHashBuffer.length; i++) {
                if (storedHashBuffer[i] !== newHashBuffer[i]) {
                    return false;
                }
            }
            
            return true;
        } catch (error) {
            console.error('Password verification error:', error);
            return false;
        }
    }

    // Password visibility toggle
    document.querySelectorAll('button[type="button"]').forEach(button => {
        if (button.querySelector('span[data-icon="visibility"]')) {
            button.addEventListener('click', () => {
                const input = button.parentElement.querySelector('input');
                const icon = button.querySelector('span');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    });

    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email').value;
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const termsAccepted = document.getElementById('terms').checked;
        const submitBtn = document.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;

        // Comprehensive validation
        if (!fullname.trim()) {
            alert('Please enter your full name!');
            return;
        }

        if (!email.trim()) {
            alert('Please enter your email!');
            return;
        }

        // Email format validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert('Please enter a valid email address!');
            return;
        }

        if (!username.trim()) {
            alert('Please enter a username!');
            return;
        }

        // Username validation (3-20 characters, alphanumeric and underscore only)
        const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
        if (!usernameRegex.test(username)) {
            alert('Username must be 3-20 characters long and contain only letters, numbers, and underscores!');
            return;
        }

        if (!password) {
            alert('Please enter a password!');
            return;
        }

        if (password !== confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        // Password strength validation
        if (password.length < 8) {
            alert('Password must be at least 8 characters long!');
            return;
        }

        if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
            alert('Password must contain at least one uppercase letter, one lowercase letter, and one number!');
            return;
        }

        if (!termsAccepted) {
            alert('Please accept the Terms of Service and Privacy Policy!');
            return;
        }

        try {
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span><span>Creating account...</span>';
            submitBtn.disabled = true;

            // Try backend API first
            try {
                console.log('Attempting registration to:', `${API_BASE_URL}/auth/register`);
                console.log('Registration data:', { username, email, password: '***' });

                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (response.ok) {
                    const data = await response.json();
                    console.log('Registration success:', data);
                    
                    // Show success message
                    submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>Account created!</span>';
                    submitBtn.classList.add('bg-green-600');
                    
                    setTimeout(() => {
                        alert('Account created successfully! Please login to continue.');
                        window.location.href = '../login_page_cholo_matched_1/code.html';
                    }, 1000);
                    return;
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    console.log('API error response:', errorData);
                    throw new Error(errorData.detail || `Server error: ${response.status}`);
                }
            } catch (apiError) {
                console.log('Backend API failed, using local storage fallback:', apiError.message);
            }

            // Fallback: Store user locally with secure password hashing
            const hashedPassword = await hashPassword(password);
            const userData = {
                id: 'user_' + Date.now(),
                username: username,
                email: email,
                fullname: fullname,
                password: hashedPassword, // Secure PBKDF2 hash with salt
                created_at: new Date().toISOString()
            };

            // Get existing users or create new array
            const existingUsers = JSON.parse(localStorage.getItem('cholo_users') || '[]');
            
            // Check if user already exists
            if (existingUsers.find(u => u.username === username || u.email === email)) {
                throw new Error('Username or email already exists');
            }

            // Add new user
            existingUsers.push(userData);
            localStorage.setItem('cholo_users', JSON.stringify(existingUsers));
            
            console.log('User registered locally:', userData);
            
            // Show success message
            submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>Account created!</span>';
            submitBtn.classList.add('bg-green-600');
            
            setTimeout(() => {
                alert('Account created successfully! Please login to continue.');
                window.location.href = '../login_page_cholo_matched_1/code.html';
            }, 1000);

        } catch (error) {
            console.error('Registration error:', error);
            alert(`Registration failed: ${error.message}`);
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // Terms and Privacy modal functions
    function showTerms() {
        alert('Terms of Service\n\n1. Acceptance of Terms\nBy using Cholo Travel, you agree to these terms.\n\n2. User Accounts\nYou must provide accurate information and maintain account security.\n\n3. Travel Services\nWe provide travel planning and booking services. Prices are subject to change.\n\n4. User Content\nYou retain rights to content you post but grant us license to use it.\n\n5. Privacy\nWe respect your privacy as outlined in our Privacy Policy.\n\n6. Limitation of Liability\nOur liability is limited to the extent permitted by law.\n\n7. Changes to Terms\nWe may update these terms periodically.\n\nFor full terms, visit our website.');
    }

    function showPrivacy() {
        alert('Privacy Policy\n\n1. Information Collection\nWe collect information you provide directly and through your use of our services.\n\n2. Information Use\nWe use your information to provide, maintain, and improve our services.\n\n3. Information Sharing\nWe do not sell your personal information to third parties.\n\n4. Data Security\nWe implement reasonable security measures to protect your data.\n\n5. Your Rights\nYou can access, update, or delete your account information.\n\n6. Cookies\nWe use cookies to enhance your experience.\n\n7. Contact Us\nFor privacy questions, contact our support team.\n\nFor full privacy policy, visit our website.');
    }

    // Handle Login Instead button with better selector
    const loginButton = document.querySelector('button.bg-surface');
    if (loginButton) {
        loginButton.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '../login_page_cholo_matched_1/code.html';
        });
    }
</script>
