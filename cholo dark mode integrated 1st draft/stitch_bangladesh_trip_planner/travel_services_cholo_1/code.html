        const token = localStorage.getItem('cholo_token');

            return false;
        }
        return true;
    }

    // Get current user data
    function getCurrentUser() {
        const currentUser = localStorage.getItem('current_user');
        return currentUser ? JSON.parse(currentUser) : null;
    }

    // Update profile picture with user initial
    function updateProfilePicture() {
        const user = getCurrentUser();
        if (user) {
            const profileImg = document.querySelector('img[alt="User profile"]');
            if (profileImg) {
                const initial = (user.fullname || user.username || 'U').charAt(0).toUpperCase();
                profileImg.src = `https://ui-avatars.com/api/?name=${initial}&background=00694c&color=ffffff&size=40&font-size=20`;
            }
        }
    }

    // Load selected destinations
    function loadSelectedDestinations() {
        const tripData = getTripData();
        const destinations = tripData.step_2?.destinations || [];
        
        const container = document.getElementById('selectedDestinations');
        const countElement = document.getElementById('destinationCount');
        
        container.innerHTML = '';
        countElement.textContent = `${destinations.length} destination${destinations.length !== 1 ? 's' : ''}`;
        
        destinations.forEach(dest => {
            const tag = document.createElement('span');
            tag.className = 'px-3 py-1 bg-primary/10 text-primary rounded-full text-sm font-medium';
            tag.textContent = `${dest.emoji} ${dest.name}`;
            container.appendChild(tag);
        });
    }

    // Load services for selected destinations
    function loadServices() {
        const tripData = getTripData();
        const destinations = tripData.step_2?.destinations || [];
        
        allServices = [];
        
        destinations.forEach(dest => {
            const services = destinationServices[dest.name];
            if (services) {
                // Add hotels
                services.hotels?.forEach(hotel => {
                    allServices.push({
                        ...hotel,
                        serviceType: 'hotels',
                        destination: dest.name,
                        icon: 'hotel',
                        category: 'Hotels'
                    });
                });
                
                // Add transport
                services.transport?.forEach(transport => {
                    allServices.push({
                        ...transport,
                        serviceType: 'transport',
                        destination: dest.name,
                        icon: 'directions_bus',
                        category: 'Transport'
                    });
                });
                
                // Add restaurants
                services.restaurants?.forEach(restaurant => {
                    allServices.push({
                        ...restaurant,
                        serviceType: 'restaurants',
                        destination: dest.name,
                        icon: 'restaurant',
                        category: 'Restaurants'
                    });
                });
                
                // Add attractions
                services.attractions?.forEach(attraction => {
                    allServices.push({
                        ...attraction,
                        serviceType: 'attractions',
                        destination: dest.name,
                        icon: 'attractions',
                        category: 'Attractions'
                    });
                });
                
                // Add shopping
                services.shopping?.forEach(shop => {
                    allServices.push({
                        ...shop,
                        serviceType: 'shopping',
                        destination: dest.name,
                        icon: 'shopping_bag',
                        category: 'Shopping'
                    });
                });
                
                // Add emergency
                services.emergency?.forEach(emergency => {
                    allServices.push({
                        ...emergency,
                        serviceType: 'emergency',
                        destination: dest.name,
                        icon: 'emergency',
                        category: 'Emergency'
                    });
                });
            }
        });
        
        displayServices(allServices);
    }

    // Display services
    function displayServices(services) {
        const grid = document.getElementById('servicesGrid');
        grid.innerHTML = '';
        
        if (services.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <span class="material-symbols-outlined text-4xl text-outline mb-4">search_off</span>
                    <p class="text-on-surface-variant">No services found for the selected criteria.</p>
                </div>
            `;
            return;
        }
        
        services.forEach(service => {
            const card = document.createElement('div');
            card.className = 'bg-surface-container rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow';
            
            card.innerHTML = `
                <div class="flex items-start gap-4 mb-4">
                    <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center flex-shrink-0">
                        <span class="material-symbols-outlined text-primary text-xl">${service.icon}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-on-surface mb-1">${service.name}</h3>
                        <p class="text-sm text-on-surface-variant">${service.category} • ${service.destination}</p>
                    </div>
                </div>
                
                <div class="space-y-2">
                    ${service.rating ? `
                        <div class="flex items-center gap-2">
                            <div class="flex">
                                ${generateStars(service.rating)}
                            </div>
                            <span class="text-sm text-on-surface-variant">${service.rating}</span>
                        </div>
                    ` : ''}
                    
                    ${service.price ? `
                        <p class="text-sm font-medium text-primary">${service.price}</p>
                    ` : ''}
                    
                    ${service.cuisine ? `
                        <p class="text-sm text-on-surface-variant">${service.cuisine}</p>
                    ` : ''}
                    
                    ${service.type ? `
                        <p class="text-sm text-on-surface-variant">${service.type}</p>
                    ` : ''}
                    
                    <p class="text-sm text-on-surface-variant">
                        <span class="material-symbols-outlined text-sm align-middle">location_on</span>
                        ${service.address}
                    </p>
                    
                    <p class="text-sm text-on-surface-variant">
                        <span class="material-symbols-outlined text-sm align-middle">call</span>
                        ${service.phone}
                    </p>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <button class="flex-1 px-3 py-2 bg-primary text-on-primary rounded-lg text-sm font-medium hover:brightness-110 transition-colors">
                        <span class="material-symbols-outlined text-sm align-middle">call</span>
                        Call
                    </button>
                    <button class="flex-1 px-3 py-2 bg-surface border border-outline-variant rounded-lg text-sm font-medium hover:bg-surface-container-low transition-colors">
                        <span class="material-symbols-outlined text-sm align-middle">directions</span>
                        Directions
                    </button>
                </div>
            `;
            
            grid.appendChild(card);
        });
    }

    // Generate star rating
    function generateStars(rating) {
        const fullStars = Math.floor(rating);
        const hasHalfStar = rating % 1 >= 0.5;
        let stars = '';
        
        for (let i = 0; i < fullStars; i++) {
            stars += '<span class="material-symbols-outlined text-sm text-yellow-500">star</span>';
        }
        
        if (hasHalfStar) {
            stars += '<span class="material-symbols-outlined text-sm text-yellow-500">star_half</span>';
        }
        
        const emptyStars = 5 - Math.ceil(rating);
        for (let i = 0; i < emptyStars; i++) {
            stars += '<span class="material-symbols-outlined text-sm text-outline-variant">star</span>';
        }
        
        return stars;
    }

    // Search functionality
    function performSearch() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        if (!searchTerm) {
            // If no search term, just apply current filter
            const filteredServices = currentFilter === 'all' 
                ? allServices 
                : allServices.filter(service => service.serviceType === currentFilter);
            displayServices(filteredServices);
            return;
        }
        
        // Filter services based on search term and current filter
        let servicesToSearch = currentFilter === 'all' 
            ? allServices 
            : allServices.filter(service => service.serviceType === currentFilter);
        
        const searchResults = servicesToSearch.filter(service => {
            return service.name.toLowerCase().includes(searchTerm) ||
                   service.category.toLowerCase().includes(searchTerm) ||
                   service.destination.toLowerCase().includes(searchTerm) ||
                   (service.cuisine && service.cuisine.toLowerCase().includes(searchTerm)) ||
                   (service.type && service.type.toLowerCase().includes(searchTerm)) ||
                   (service.address && service.address.toLowerCase().includes(searchTerm));
        });
        
        displayServices(searchResults);
    }

    // Setup filter buttons
    function setupFilterButtons() {
        const filterButtons = document.querySelectorAll('.service-filter');
        
        filterButtons.forEach(button => {
            button.addEventListener('click', () => {
                const serviceType = button.dataset.service;
                
                // Update button styles
                filterButtons.forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-on-primary');
                    btn.classList.add('bg-surface', 'border', 'border-outline-variant');
                });
                
                button.classList.remove('bg-surface', 'border', 'border-outline-variant');
                button.classList.add('bg-primary', 'text-on-primary');
                
                // Filter services
                currentFilter = serviceType;
                
                // Apply search if there's a search term
                const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
                if (searchTerm) {
                    performSearch();
                } else {
                    const filteredServices = serviceType === 'all' 
                        ? allServices 
                        : allServices.filter(service => service.serviceType === serviceType);
                    displayServices(filteredServices);
                }
            });
        });
    }

    // Setup search functionality
    function setupSearch() {
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        
        // Search on button click
        if (searchButton) {
            searchButton.addEventListener('click', (e) => {
                e.preventDefault();
                performSearch();
            });
        }
        
        // Search on Enter key
        if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });
            
            // Live search as user types (with debounce)
            let searchTimeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    performSearch();
                }, 300); // 300ms debounce
            });
        }
    }

    // Setup navigation
    function setupNavigation() {
        // Theme toggle
        const themeToggle = document.querySelector('button[data-icon="dark_mode"]');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const currentTheme = localStorage.getItem('theme') || 'light';
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                localStorage.setItem('theme', newTheme);
                
                if (newTheme === 'dark') {
                    window.location.href = '../travel_services_cholo_2/code.html';
                }
            });
        }

        // Back button
        const backButton = document.querySelector('button[data-icon="arrow_back"]');
        if (backButton) {
            backButton.addEventListener('click', () => {
                window.location.href = '../step_2_destination_picker_cholo_1/code.html';
            });
        }

        // Bottom navigation
        const navItems = document.querySelectorAll('.md\\:hidden .flex-col');
        navItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                if (index === 0) {
                    window.location.href = '../dashboard_cholo_1/code.html';
                }
            });
        });
    }
</script>
</html>
