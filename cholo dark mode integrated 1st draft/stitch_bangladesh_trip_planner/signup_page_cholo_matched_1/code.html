<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Cholo - Create Account</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1D9E75",
                        "on-primary": "#ffffff",
                        "primary-container": "#0D2819",
                        "on-primary-container": "#BDEBDB",
                        "secondary": "#4A6359",
                        "on-secondary": "#ffffff",
                        "surface": "#0A0F0D",
                        "on-surface": "#E1E3DF",
                        "surface-container": "#111412",
                        "outline": "#707974",
                        "outline-variant": "#BFC9C3",
                        "background": "#050807"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Be Vietnam Pro", "sans-serif"],
                        "body": ["Hind Siliguri", "sans-serif"],
                    }
                },
            },
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .logo-font {
            font-family: 'Be Vietnam Pro', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
    <main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
        <!-- Decorative background elements -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-primary/10 rounded-full blur-[120px]"></div>
            <div class="absolute top-[40%] -right-[15%] w-[500px] h-[500px] bg-primary/15 rounded-full blur-[120px]"></div>
        </div>
        <div class="w-full max-w-md z-10">
            <div class="bg-surface-container border border-outline-variant/50 rounded-2xl p-8 shadow-sm">
                <div class="flex flex-col items-center mb-10">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary text-4xl" data-icon="travel_explore">travel_explore</span>
                        <span class="text-3xl font-black logo-font tracking-tighter text-on-surface">Cholo</span>
                    </div>
                    <h1 class="text-2xl font-bold text-on-surface">Create Account</h1>
                    <p class="text-outline mt-1 text-sm">Start your journey with us</p>
                </div>
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="space-y-2">
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="fullname">Full Name</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
                                <input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="fullname" placeholder="Enter your full name" type="text" required minlength="2" maxlength="50"/>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="email">Email</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="email">email</span>
                                <input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="email" placeholder="Enter your email" type="email" required/>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="username">Username</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="person_outline">person_outline</span>
                                <input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-4 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="username" placeholder="Choose a username" type="text" required minlength="3" maxlength="20"/>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-outline uppercase tracking-wider ml-1" for="password">Password</label>
                            <div class="relative group">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
                                <input class="w-full bg-surface border border-outline-variant rounded-xl py-3.5 pl-12 pr-12 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline/50" id="password" placeholder="Create a strong password" type="password" required minlength="8" maxlength="128"/>
                                <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors" onclick="togglePassword('password')">
                                    <span class="material-symbols-outlined" id="passwordToggle">visibility</span>
                                </button>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <input type="checkbox" id="terms" class="mr-2" required>
                            <label for="terms" class="text-sm text-on-surface">I agree to the <button type="button" class="text-primary font-bold hover:underline" onclick="showTerms()">Terms of Service</button> and <button type="button" class="text-primary font-bold hover:underline" onclick="showPrivacy()">Privacy Policy</button></label>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button type="submit" class="flex-1 bg-primary text-on-primary font-bold py-4 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-all shadow-lg shadow-primary/20 group">
                            Create Account
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                        <button type="button" onclick="window.location.href='../start_screen_cholo_matched/code.html'" class="flex-1 bg-transparent text-on-surface font-semibold py-4 rounded-xl border border-outline-variant hover:bg-secondary-container/30 active:scale-[0.98] transition-all">
                            Back
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script>
        // Secure signup form handling
        function handleSignup(event) {
            event.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (!fullname || !email || !username || !password || !terms) {
                alert('Please fill in all fields and agree to terms');
                return;
            }
            
            if (fullname.length < 2 || fullname.length > 50) {
                alert('Full name must be between 2 and 50 characters');
                return;
            }
            
            if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
                alert('Please enter a valid email address');
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                alert('Username must be between 3 and 20 characters');
                return;
            }
            
            if (password.length < 8 || password.length > 128) {
                alert('Password must be between 8 and 128 characters');
                return;
            }
            
            // Secure user creation
            const users = JSON.parse(localStorage.getItem('cholo_users') || '[]');
            
            // Check for existing users
            if (users.some(u => u.email === email || u.username === username)) {
                alert('An account with this email or username already exists');
                return;
            }
            
            // Create new user
            const newUser = {
                id: Date.now().toString(),
                name: fullname,
                email: email,
                username: username,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('cholo_users', JSON.stringify(users));
            
            alert('Account created successfully! Redirecting to login...');
            setTimeout(() => {
                window.location.href = '../login_page_cholo_matched_1/code.html';
            }, 1000);
        }
        
        // Password visibility toggle
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const button = field.parentElement.querySelector('button span');
            if (field.type === 'password') {
                field.type = 'text';
                button.textContent = 'visibility_off';
            } else {
                field.type = 'password';
                button.textContent = 'visibility';
            }
        }
        
        // Information modals
        function showTerms() {
            alert('Terms of Service\n\nBy using Cholo Travel, you agree to our terms of service and privacy policy.');
        }
        
        function showPrivacy() {
            alert('Privacy Policy\n\nWe respect your privacy and protect your personal information.');
        }
        
        function showHelp() {
            alert('Help\n\nFor support, contact our team at support@cholo.travel');
        }
        
        console.log('Secure signup page loaded successfully');
    </script>
</body>
</html>
